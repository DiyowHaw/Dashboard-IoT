<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - IRIGrow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="flex flex-col md:flex-row w-full max-w-5xl rounded-3xl overflow-hidden shadow-2xl bg-[#1e293b]">
        
        <div class="w-full md:w-3/5 bg-gray-900 p-8 flex items-center justify-center">
            <img src="alat.jpeg" alt="Smart Irrigation" class="rounded-2xl shadow-lg hover:scale-105 transition duration-500">
        </div>

        <div class="w-full md:w-2/5 p-10 flex flex-col justify-center glass-card">
            <div class="flex items-center justify-center gap-3 mb-6">
                <img src="Logo (2).png" alt="Logo" class="w-10 h-10">
                <h2 class="text-3xl font-extrabold text-white">IRI<span class="text-emerald-500">Grow</span></h2>
            </div>
            
            <div class="space-y-4">
                <p class="text-center text-gray-300 font-semibold mb-2">Buat Akun Baru</p>
                
                <input type="text" id="name" placeholder="Nama Lengkap" 
                    class="w-full p-4 rounded-xl bg-gray-800 text-white border border-gray-700 focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 outline-none transition">
                
                <input type="email" id="email" placeholder="Alamat Email" 
                    class="w-full p-4 rounded-xl bg-gray-800 text-white border border-gray-700 focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 outline-none transition">
                
                <input type="password" id="password" placeholder="Password" 
                    class="w-full p-4 rounded-xl bg-gray-800 text-white border border-gray-700 focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 outline-none transition">
                
                <input type="password" id="confirmPassword" placeholder="Konfirmasi Password" 
                    class="w-full p-4 rounded-xl bg-gray-800 text-white border border-gray-700 focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 outline-none transition">
                
                <button id="btnRegister" class="w-full py-4 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl font-bold text-lg shadow-lg shadow-emerald-900/20 transition-all active:scale-95">
                    Daftar Sekarang
                </button>
                
                <p class="text-center text-sm text-gray-400 mt-4">
                    Sudah punya akun? <a href="login.html" class="text-emerald-400 font-bold hover:underline">Login di sini</a>
                </p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDq0xZ_lykDxp-EvILlI2AOMCpYE7Wgvrc",
            authDomain: "iot-dashboard-39482.firebaseapp.com",
            projectId: "iot-dashboard-39482",
            storageBucket: "iot-dashboard-39482.firebasestorage.app",
            messagingSenderId: "668572009153",
            appId: "1:668572009153:web:fea639d6421fefdbf74a40",
            measurementId: "G-CC872FXDT3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('btnRegister').addEventListener('click', () => {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Validasi sederhana
            if (password !== confirmPassword) {
                alert("Password tidak cocok!");
                return;
            }

            createUserWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    // Simpan Nama ke profile Firebase
                    updateProfile(userCredential.user, { displayName: name });
                    alert("Registrasi Berhasil!");
                    window.location.href = "login.html";
                })
                .catch((error) => {
                    alert("Gagal daftar: " + error.message);
                });
        });
    </script>
</body>
</html>
