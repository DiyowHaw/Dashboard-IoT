<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - IRIGrow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="flex flex-col md:flex-row w-full max-w-5xl rounded-3xl overflow-hidden shadow-2xl bg-[#1e293b]">
        
        <div class="w-full md:w-3/5 bg-gray-900 p-8 flex items-center justify-center">
            <img src="alat.jpeg" alt="Smart Irrigation" class="rounded-2xl shadow-lg hover:scale-105 transition duration-500">
        </div>

        <div class="w-full md:w-2/5 p-10 flex flex-col justify-center glass-card">
            <div class="flex items-center justify-center gap-3 mb-8">
                <img src="Logo (2).png" alt="Logo" class="w-10 h-10">
                <h2 class="text-3xl font-extrabold text-white">IRI<span class="text-emerald-500">Grow</span></h2>
            </div>
            
            <div class="space-y-4">
                <input type="email" id="email" placeholder="Alamat Email" 
                    class="w-full p-4 rounded-xl bg-gray-800 text-white border border-gray-700 focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 outline-none transition">
                
                <input type="password" id="password" placeholder="Password" 
                    class="w-full p-4 rounded-xl bg-gray-800 text-white border border-gray-700 focus:border-emerald-500 focus:ring-1 focus:ring-emerald-500 outline-none transition">
                
                <button id="btnLogin" class="w-full py-4 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl font-bold text-lg shadow-lg shadow-emerald-900/20 transition-all active:scale-95">
                    Login
                </button>
                
                <div class="relative py-2">
                    <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-700"></div></div>
                    <div class="relative flex justify-center text-xs uppercase"><span class="bg-[#1e293b] px-2 text-gray-400">Atau</span></div>
                </div>

                <button id="btnGoogle" class="w-full py-4 bg-white text-gray-900 rounded-xl font-semibold hover:bg-gray-100 transition flex items-center justify-center gap-2">
                    <i class="fab fa-google text-red-500"></i> Login dengan Google
                </button>
                
                <p class="text-center text-sm text-gray-400 mt-6">
                    Belum punya akun? <a href="register.html" class="text-emerald-400 font-bold hover:underline">Daftar sekarang</a>
                </p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDq0xZ_lykDxp-EvILlI2AOMCpYE7Wgvrc",
            authDomain: "iot-dashboard-39482.firebaseapp.com",
            projectId: "iot-dashboard-39482",
            storageBucket: "iot-dashboard-39482.firebasestorage.app",
            messagingSenderId: "668572009153",
            appId: "1:668572009153:web:fea639d6421fefdbf74a40",
            measurementId: "G-CC872FXDT3"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        document.getElementById('btnLogin').addEventListener('click', () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            signInWithEmailAndPassword(auth, email, password)
                .then(() => { window.location.href = "index.php"; })
                .catch(() => { alert("Gagal login: Periksa email & password Anda."); });
        });

        document.getElementById('btnGoogle').addEventListener('click', () => {
            signInWithPopup(auth, provider)
                .then(() => { window.location.href = "index.php"; })
                .catch((error) => { console.error(error); alert("Gagal login dengan Google."); });
        });
    </script>
</body>
</html>
